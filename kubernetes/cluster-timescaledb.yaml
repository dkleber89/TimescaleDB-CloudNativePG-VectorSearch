# CloudNativePG Cluster with TimescaleDB, pgvector, and pgvectorscale
# Deploys a 3-node PostgreSQL cluster optimized for time-series and AI/vector workloads
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: timescaledb-cluster
  namespace: timescaledb
spec:
  # 3-node cluster for high availability and read scaling
  instances: 3
  
  # References the custom image catalog with TimescaleDB + pgvector + pgvectorscale
  # ⚠️  IMPORTANT: The catalog name must match the name in imagecatalog-timescaledb.yaml
  # If you change "timescale-ai" here, you MUST also change it in imagecatalog-timescaledb.yaml
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ImageCatalog
    name: timescale-ai
    major: 17
  
  # Storage configuration per instance
  storage:
    size: 10Gi
  postgresql:
    # Load TimescaleDB extension at server startup
    shared_preload_libraries:
      - timescaledb
    
    parameters:
      # ===== Memory Configuration =====
      # Tuned for 2GB pod memory allocation (adjust based on actual pod resources)
      
      # work_mem: Memory per query operation (sorts, hash joins, etc.)
      # Increased for vector similarity searches and aggregations
      work_mem: '128MB'
      
      # maintenance_work_mem: Memory for maintenance operations (CREATE INDEX, VACUUM, ANALYZE)
      # Critical for pgvectorscale diskann index builds which are memory-intensive
      maintenance_work_mem: '1GB'
      
      # shared_buffers: PostgreSQL buffer pool (typically 25% of system RAM)
      # Caches frequently accessed data blocks and index pages
      shared_buffers: '512MB'
      
      # effective_cache_size: Hint to query planner about total available cache (OS + PostgreSQL)
      # Set to ~75% of system RAM for accurate cost estimation
      effective_cache_size: '1536MB'
      
      # ===== Connection Configuration =====
      # Maximum concurrent connections to the cluster
      max_connections: '100'
      
      # max_worker_processes: Parallel workers for index builds and query execution
      # CloudNativePG default is 32; increase for larger clusters or more parallelism
      max_worker_processes: '32'
      
      # ===== TimescaleDB Configuration =====
      # Background workers for continuous aggregates, compression, and data retention policies
      timescaledb.max_background_workers: '4'
  # Cluster initialization configuration
  bootstrap:
    initdb:
      # Create application database and owner on first cluster initialization
      database: app
      owner: app
      
      # SQL commands executed after database creation
      # Installs all three extensions required for time-series and AI workloads
      postInitApplicationSQL:
        # TimescaleDB: Time-series database extension with compression and continuous aggregates
        - CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
        
        # pgvector: In-memory vector similarity search (C extension)
        - CREATE EXTENSION IF NOT EXISTS vector CASCADE;
        
        # pgvectorscale: Disk-based vector indexing with diskann for scalable similarity search
        - CREATE EXTENSION IF NOT EXISTS vectorscale CASCADE;
